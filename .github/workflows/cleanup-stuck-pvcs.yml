name: Cleanup Stuck PVCs

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Cleanup Stuck PVCs
      run: |
        echo "=== Deleting stuck PVCs ==="
        kubectl delete pvc peerbot-thread-workspace-u095zlhk-198-723619 -n peerbot || echo "PVC not found"
        kubectl delete pvc peerbot-thread-workspace-u095zlhk-838-220349 -n peerbot || echo "PVC not found"
        
        echo -e "\n=== Deleting associated deployments ==="
        kubectl delete deployment peerbot-worker-u095zlhk-198-723619 -n peerbot || echo "Deployment not found"
        kubectl delete deployment peerbot-worker-u095zlhk-838-220349 -n peerbot || echo "Deployment not found"
        
        echo -e "\n=== Remaining PVCs ==="
        kubectl get pvc -n peerbot