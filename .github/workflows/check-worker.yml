name: Check Worker Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Check Worker Status
      run: |
        echo "=== Worker Pods ==="
        kubectl get pods -n peerbot | grep worker || echo "No worker pods"
        
        echo -e "\n=== Worker Logs (if exists) ==="
        WORKER_POD=$(kubectl get pods -n peerbot -o name | grep worker | head -1)
        if [ ! -z "$WORKER_POD" ]; then
          echo "Checking logs for $WORKER_POD"
          kubectl logs -n peerbot $WORKER_POD --tail=50 || echo "Could not get logs"
        else
          echo "No worker pod found"
        fi
        
        echo -e "\n=== Worker Environment (if exists) ==="
        if [ ! -z "$WORKER_POD" ]; then
          kubectl exec -n peerbot $WORKER_POD -- env | grep -E "ANTHROPIC|CLAUDE|NODE_ENV|THREAD" | head -15 || echo "Could not get env"
        fi