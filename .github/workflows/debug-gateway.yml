name: Debug Gateway Logs

on:
  workflow_dispatch:

jobs:
  debug:
    name: Get gateway logs
    runs-on: ubuntu-latest
    environment: community

    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Get full gateway logs and clear stale locks
        run: |
          echo "=== Clearing stale Redis locks ==="
          REDIS_POD=$(kubectl get pods -n lobu -l app.kubernetes.io/component=master,app.kubernetes.io/name=redis -o jsonpath='{.items[0].metadata.name}')
          REDIS_PASS=$(kubectl get secret lobu-redis -n lobu -o jsonpath='{.data.redis-password}' | base64 -d)
          # Find and delete ALL lock keys (thread locks, chat-conn locks, etc.)
          for pattern in "thread:*:lock" "chat-conn:*:lock*" "*lock*telegram*" "*telegram*lock*"; do
            echo "Searching pattern: $pattern"
            kubectl exec -n lobu $REDIS_POD -- redis-cli -a "$REDIS_PASS" --no-auth-warning KEYS "$pattern" | while read key; do
              echo "  Deleting: $key"
              kubectl exec -n lobu $REDIS_POD -- redis-cli -a "$REDIS_PASS" --no-auth-warning DEL "$key"
            done
          done

          # Also show all chat-conn keys for debugging
          echo "=== Chat state keys ==="
          kubectl exec -n lobu $REDIS_POD -- redis-cli -a "$REDIS_PASS" --no-auth-warning KEYS "chat-conn*" | head -20
          echo "=== Locks cleared ==="

          echo ""
          echo "=== Gateway Pod Logs (last 200 lines) ==="
          kubectl logs -n lobu deployment/lobu-gateway --tail=200
