name: Check Orchestrator Image

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Check Orchestrator Image
      run: |
        echo "=== Orchestrator Deployment Image ==="
        kubectl get deployment peerbot-orchestrator -n peerbot -o jsonpath='{.spec.template.spec.containers[0].image}'
        echo ""
        
        echo -e "\n=== Orchestrator Pod Image ==="
        kubectl get pods -n peerbot -l app.kubernetes.io/component=orchestrator -o jsonpath='{.items[0].spec.containers[0].image}'
        echo ""
        
        echo -e "\n=== Expected Image Hash ==="
        echo "Should be: e552e8cf857a25d271bf888f57a45295de8a8751"