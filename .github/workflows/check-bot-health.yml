name: Check Bot Health

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Check Bot Components
      run: |
        echo "=== Pod Status ==="
        kubectl get pods -n peerbot
        
        echo -e "\n=== Dispatcher Logs (last 30 lines) ==="
        kubectl logs -n peerbot deployment/peerbot-dispatcher --tail=30
        
        echo -e "\n=== Orchestrator Logs (last 20 lines) ==="
        kubectl logs -n peerbot deployment/peerbot-orchestrator --tail=20
        
        echo -e "\n=== Check for Worker Pods ==="
        kubectl get pods -n peerbot | grep worker || echo "No worker pods found"
        
        echo -e "\n=== Check Services ==="
        kubectl get services -n peerbot
        
        echo -e "\n=== Check Dispatcher Environment ==="
        kubectl exec -n peerbot deployment/peerbot-dispatcher -- env | grep -E "SLACK|ORCHESTRATOR" | head -10