name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  # Enables npm trusted publishing (OIDC) when configured on npmjs.com.
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          
      # The logic below handles NPM publishing after a release is created
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.releases_created == 'true' }}

      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: bun install --frozen-lockfile

      - name: Publish packages to NPM
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-packages.mjs --skip-bump

      # Trigger Docker build and K8s deployment after release
      - name: Trigger Docker Build
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: release-published
          client-payload: '{"version": "${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"}'
