name: Evals

on:
  workflow_dispatch:
    inputs:
      example:
        description: "Example project to eval (empty = all)"
        required: false
        type: string
      model:
        description: "Model override (e.g. openrouter/openai/gpt-oss-20b:free)"
        required: false
        type: string
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday 6am UTC
  push:
    branches: [main]
    paths:
      - "examples/**/evals/**"
      - "packages/cli/src/eval/**"
      - "packages/cli/src/commands/eval.ts"

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Requires OPENROUTER_API_KEY secret to be configured
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJSON(inputs.example && format('["{0}"]', inputs.example) || '["hr-assistant"]') }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: |
          cd packages/core && bun run build
          cd ../cli && bun run build

      - name: Build local gateway image
        run: docker build -f docker/Dockerfile.gateway -t lobu-gateway:ci .

      - name: Require OpenRouter secret
        run: |
          if [ -z "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            echo "OPENROUTER_API_KEY secret is not configured"
            exit 1
          fi

      - name: Select healthy free OpenRouter model
        run: |
          OPENROUTER_API_KEY='${{ secrets.OPENROUTER_API_KEY }}' \
          OPENROUTER_SELECTOR_VERBOSE=1 \
          bun scripts/select-openrouter-model.mjs --write "$RUNNER_TEMP/openrouter.env"
          cat "$RUNNER_TEMP/openrouter.env"

      - name: Apply selected model to example config
        working-directory: examples/${{ matrix.example }}
        run: |
          source "$RUNNER_TEMP/openrouter.env"
          python3 - <<'PY'
          from pathlib import Path
          import os
          path = Path('lobu.toml')
          text = path.read_text()
          target = 'model = "openrouter/openai/gpt-oss-20b:free"'
          replacement = f'model = "{os.environ["OPENROUTER_MODEL_REF"]}"'
          if target not in text:
              raise SystemExit(f"Expected model line not found in {path}")
          path.write_text(text.replace(target, replacement, 1))
          PY

      - name: Create .env for example
        working-directory: examples/${{ matrix.example }}
        run: |
          cat > .env <<EOF
          ADMIN_PASSWORD=ci-eval-password
          ENCRYPTION_KEY=$(openssl rand -hex 32)
          GATEWAY_PORT=8081
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          EOF

      - name: Start stack
        working-directory: examples/${{ matrix.example }}
        run: |
          mkdir -p data && chmod 777 data
          # Disable Redis write-stop-on-error for CI and use the gateway image built from this checkout
          cat > docker-compose.override.yml <<'YAML'
          services:
            redis:
              command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --save "" --stop-writes-on-bgsave-error no --dir /tmp
            gateway:
              image: lobu-gateway:ci
              pull_policy: never
          YAML
          docker compose up -d
          echo "Waiting for gateway to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/health > /dev/null 2>&1; then
              echo "Gateway is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Gateway failed to start"
              docker compose logs gateway
              exit 1
            fi
            sleep 2
          done

      - name: Run evals
        working-directory: examples/${{ matrix.example }}
        env:
          ADMIN_PASSWORD: ci-eval-password
        run: |
          MODEL_FLAG=""
          if [ -n "${{ inputs.model }}" ]; then
            MODEL_FLAG="-m ${{ inputs.model }}"
          fi
          node ../../packages/cli/bin/lobu.js eval smoke --ci --output eval-results.json $MODEL_FLAG

      - name: Gateway logs
        if: always()
        working-directory: examples/${{ matrix.example }}
        run: docker compose logs gateway 2>&1 | tail -100

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ matrix.example }}
          path: |
            examples/${{ matrix.example }}/eval-results.json
            examples/${{ matrix.example }}/agents/*/evals/evals-report.md

      - name: Print eval report
        if: always()
        working-directory: examples/${{ matrix.example }}
        run: |
          for report in agents/*/evals/evals-report.md; do
            if [ -f "$report" ]; then
              echo "## Eval Report: $report"
              cat "$report"
            fi
          done

      - name: Stop stack
        if: always()
        working-directory: examples/${{ matrix.example }}
        run: docker compose down
