name: Deploy to Kubernetes (v2)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'
        type: string
      tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'
        type: string
      recreate_database:
        description: 'Recreate PostgreSQL database (CAUTION: Data loss!)'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [deploy-community]
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'charts/**'
      - 'Dockerfile.*'
      - '.github/workflows/deploy-community-v2.yml'

env:
  NAMESPACE: peerbot
  DEPLOYMENT_NAME: peerbot
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME || 'peerbot' }}

jobs:
  deploy:
    name: Deploy to OVH Kubernetes
    runs-on: ubuntu-latest
    environment: community
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.client_payload.ref || github.ref }}
      
      - name: Determine image tag
        id: get-tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            # Use manual input tag
            TAG="${{ github.event.inputs.tag }}"
          elif [[ -n "${{ github.event.client_payload.tag }}" ]]; then
            # Use repository dispatch tag
            TAG="${{ github.event.client_payload.tag }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # For push events, use commit SHA
            TAG="${{ github.sha }}"
          else
            # Default to latest
            TAG="latest"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using Docker image tag: ${TAG}"
          
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'
          
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'
          
      - name: Setup Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
          
      - name: Clean up Helm releases and secrets
        run: |
          # Check for stuck deployments and rollback if needed
          echo "Checking for stuck Helm operations..."
          PENDING=$(helm list -n $NAMESPACE --pending -q)
          if [ -n "$PENDING" ]; then
            echo "Found pending release: $PENDING - attempting rollback"
            helm rollback $PENDING -n $NAMESPACE || echo "Rollback failed, trying to delete"
            helm delete $PENDING -n $NAMESPACE --no-hooks || echo "Delete also failed"
          fi
          
          # List all Helm releases in the namespace
          echo "Current Helm releases:"
          helm list -n $NAMESPACE || true
          
          # Keep only the last 3 releases (if multiple exist with different names)
          RELEASES=$(helm list -n $NAMESPACE -q | head -n -3)
          if [ -n "$RELEASES" ]; then
            echo "Cleaning up old releases: $RELEASES"
            for release in $RELEASES; do
              helm uninstall $release -n $NAMESPACE || echo "Failed to uninstall $release"
            done
          fi
          
          # Clean up orphaned Helm secrets to stay under quota
          echo "Cleaning up orphaned Helm secrets..."
          kubectl get secrets -n $NAMESPACE -o name | grep "sh.helm.release" | head -n -3 | xargs -r kubectl delete -n $NAMESPACE || true
      
      - name: Handle PostgreSQL database recreation
        if: ${{ github.event.inputs.recreate_database == 'true' }}
        run: |
          echo "⚠️ RECREATING PostgreSQL DATABASE - All data will be lost!"
          
          # Delete the PostgreSQL StatefulSet and PVC
          echo "Deleting PostgreSQL StatefulSet and data..."
          kubectl delete statefulset $DEPLOYMENT_NAME-postgresql -n $NAMESPACE --ignore-not-found=true
          kubectl delete pvc data-$DEPLOYMENT_NAME-postgresql-0 -n $NAMESPACE --ignore-not-found=true
          
          # Also delete the secret to force password regeneration
          kubectl delete secret $DEPLOYMENT_NAME-postgresql -n $NAMESPACE --ignore-not-found=true
          
          echo "PostgreSQL database will be recreated with fresh data"
          
      - name: Handle PostgreSQL immutable field updates
        if: ${{ github.event.inputs.recreate_database != 'true' }}
        run: |
          # Check if PostgreSQL StatefulSet exists and might have immutable field issues
          if kubectl get statefulset $DEPLOYMENT_NAME-postgresql -n $NAMESPACE 2>/dev/null; then
            echo "PostgreSQL StatefulSet exists, checking for potential issues..."
            
            # Try a dry-run to detect immutable field errors
            if ! helm upgrade $DEPLOYMENT_NAME charts/peerbot \
              --namespace $NAMESPACE \
              --dry-run \
              --values charts/peerbot/values-community.yaml \
              --set postgresql.enabled=true 2>&1 | grep -q "Forbidden: updates to statefulset spec"; then
              echo "No immutable field issues detected"
            else
              echo "Immutable field issue detected, recreating StatefulSet (keeping data)..."
              # Delete StatefulSet but keep pods and data
              kubectl delete statefulset $DEPLOYMENT_NAME-postgresql -n $NAMESPACE --cascade=orphan || true
            fi
          fi
      
      - name: Deploy with make
        env:
          # Mark as GitHub Actions environment
          GITHUB_ACTIONS: "true"
          # Kubernetes configuration
          NAMESPACE: ${{ env.NAMESPACE }}
          DEPLOYMENT_NAME: ${{ env.DEPLOYMENT_NAME }}
          # Docker image configuration
          DOCKER_NAMESPACE: ${{ env.DOCKER_NAMESPACE }}
          IMAGE_TAG: ${{ steps.get-tag.outputs.tag }}
          # Application secrets
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_PEERBOT }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          POSTGRESQL_PASSWORD: ${{ secrets.POSTGRESQL_PASSWORD }}
        run: |
          echo "🚀 Deploying with make deploy..."
          make deploy --target=community
            
      - name: Verify Deployment
        run: |
          echo "🚀 Deployment Status:"
          kubectl get pods -n $NAMESPACE
          echo ""
          echo "📊 Services:"
          kubectl get svc -n $NAMESPACE
          echo ""
          
          # Wait for all pods to be ready
          echo "⏳ Waiting for all pods to be ready..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=peerbot -n $NAMESPACE --timeout=300s || true
          
          echo ""
          echo "📝 Recent Logs from Dispatcher:"
          kubectl logs -n $NAMESPACE deployment/$DEPLOYMENT_NAME-dispatcher --tail=20 || true
          echo ""
          echo "📝 Recent Logs from Orchestrator:"
          kubectl logs -n $NAMESPACE deployment/$DEPLOYMENT_NAME-orchestrator --tail=20 || true
          
          # Check if orchestrator successfully ran migrations
          echo ""
          echo "🗄️ Checking database migration status:"
          kubectl logs -n $NAMESPACE deployment/$DEPLOYMENT_NAME-orchestrator | grep -E "migrations|dbmate|Database" | tail -10 || echo "Could not find migration logs"
          
      - name: Slack Notification (Success)
        if: success() && github.event_name == 'push'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Peerbot deployed successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Peerbot Deployment Successful*\n• *Version:* `${{ steps.get-tag.outputs.tag }}`\n• *Branch:* `${{ github.ref_name }}`\n• *Deployed by:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          
      - name: Slack Notification (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Peerbot deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Peerbot Deployment Failed*\n• *Version:* `${{ steps.get-tag.outputs.tag }}`\n• *Branch:* `${{ github.ref_name }}`\n• *Failed by:* ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}