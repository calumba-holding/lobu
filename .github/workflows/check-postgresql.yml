name: Check PostgreSQL Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Check PostgreSQL Status
      run: |
        echo "=== PostgreSQL Pod Status ==="
        kubectl get pod peerbot-postgresql-0 -n peerbot
        
        echo -e "\n=== PostgreSQL Logs ==="
        kubectl logs peerbot-postgresql-0 -n peerbot --tail=50 || echo "Could not get logs"
        
        echo -e "\n=== PostgreSQL Service ==="
        kubectl get service peerbot-postgresql -n peerbot -o yaml | grep -A 5 "spec:"
        
        echo -e "\n=== Test PostgreSQL Connection ==="
        kubectl run -i --rm --image=postgres:16 test-pg --restart=Never -n peerbot -- \
          psql postgresql://postgres:community-peerbot-2024@peerbot-postgresql:5432/peerbot -c "SELECT 1" || echo "Connection failed"