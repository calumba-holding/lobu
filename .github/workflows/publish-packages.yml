name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump: patch | minor | major | explicit like 3.1.0 | skip"
        required: false
        default: "skip"
        type: string
      provenance:
        description: "Attach npm provenance (requires trusted publisher configured on npmjs.com)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  # Needed for npm trusted publishing (OIDC). Only effective when each
  # package is registered on npmjs.com → Settings → Publishing access →
  # Add trusted publisher → Workflow: .github/workflows/publish-packages.yml,
  # Environment: production.
  id-token: write

jobs:
  publish-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish packages
        env:
          # Legacy path: NPM_TOKEN secret. Ignored when trusted publishing is
          # configured and the runner already has an OIDC session.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: ${{ inputs.provenance && 'true' || 'false' }}
        run: |
          if [ "${{ inputs.bump }}" = "skip" ]; then
            node scripts/publish-packages.mjs --skip-bump
          else
            node scripts/publish-packages.mjs "${{ inputs.bump }}"
          fi
