{{- if .Values.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "peerbot.fullname" . }}-gateway-pdb
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "peerbot.labels" . | nindent 4 }}
    component: gateway
spec:
  # Ensure at least one gateway pod is always available
  {{- if .Values.podDisruptionBudget.gateway.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.gateway.minAvailable }}
  {{- else }}
  maxUnavailable: {{ .Values.podDisruptionBudget.gateway.maxUnavailable | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ include "peerbot.name" . }}
      component: gateway

---
# PDB for worker jobs - allow more disruption since they are transient
{{- if .Values.worker.job }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "peerbot.fullname" . }}-worker-pdb
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "peerbot.labels" . | nindent 4 }}
    component: worker
spec:
  # Allow more aggressive disruption for worker pods
  {{- if .Values.podDisruptionBudget.worker.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.worker.minAvailable }}
  {{- else }}
  maxUnavailable: {{ .Values.podDisruptionBudget.worker.maxUnavailable | default "50%" }}
  {{- end }}
  selector:
    matchLabels:
      app: claude-worker
      component: worker
{{- end }}

{{- end }}