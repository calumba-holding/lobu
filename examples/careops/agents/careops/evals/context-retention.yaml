version: 1
name: context-retention
description: Agent remembers context across turns
trials: 3
timeout: 60
tags: [behavioral, multi-turn]

turns:
  - content: "I'm managing a patient named Alice Chen who sees Dr. Patel every Tuesday."

  - content: "Which doctor does Alice see?"
    assert:
      - type: contains
        value: "Patel"
        weight: 0.5
      - type: llm-rubric
        value: "Correctly recalls Dr. Patel from the previous message"
        weight: 0.5

  - content: "And what's the patient's name?"
    assert:
      - type: contains
        value: "Alice"
