version: '3.8'

services:
  # Build worker image that orchestrator will use
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        NODE_ENV: development
    image: peerbot-worker:latest
    # This service only builds the image, doesn't run continuously
    command: echo "Worker image built successfully"
    profiles:
      - build-only

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    restart: unless-stopped  # Auto-restart on failure, but not if manually stopped
    environment:
      NODE_ENV: development
      AGENT_DEFAULT_MODEL: ${AGENT_DEFAULT_MODEL}
      QUEUE_URL: redis://redis:6379/0
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      INGRESS_URL: ${INGRESS_URL:-http://localhost:8080}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-docker}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      HOST_PROJECT_PATH: ${PWD}
      PEERBOT_MCP_SERVERS_FILE: ${PEERBOT_MCP_SERVERS_FILE:-examples/mcp/oauth.json}
      PEERBOT_PUBLIC_GATEWAY_URL: ${PEERBOT_PUBLIC_GATEWAY_URL}
    volumes:
      # Mount Docker socket for Docker mode
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent env storage
      - env_storage:/app/.peerbot/env
      # HOT RELOAD: Mount entire packages directory for live changes
      - ./packages:/app/packages
      # Mount TypeScript config
      - ./tsconfig.json:/app/tsconfig.json:ro
      # Mount MCP config for live editing
      - ./examples:/app/examples:ro
      # Use anonymous volumes for node_modules to prevent conflicts with host
      - /app/packages/gateway/node_modules
      - /app/packages/core/node_modules
      - /app/packages/github/node_modules
      - /app/node_modules
    working_dir: /app
    command: bun --watch /app/packages/gateway/src/index.ts
    ports:
      - "3000:3000"
      - "8080:8080"  # OAuth and health endpoints
    networks:
      - peerbot-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - peerbot-network

networks:
  peerbot-network:
    driver: bridge

volumes:
  redis_data:
  env_storage:
